name: Gerar ISO Windows All-In-One ESD (10-11)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Instalar ferramentas
        shell: cmd
        run: |
          choco install 7zip windows-adk -y

      - name: Criar estrutura
        shell: cmd
        run: |
          mkdir work
          mkdir extract
          mkdir iso

      # =========================
      # DOWNLOAD
      # =========================
      - name: Baixar arquivos
        shell: cmd
        run: |
          cd work

          curl.exe -L -o w11.7z.001 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W11-23H2-6060-W10UI-3/W1123H26060ESDISOW10UI.7z.001
          curl.exe -L -o w11.7z.002 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W11-23H2-6060-W10UI-3/W1123H26060ESDISOW10UI.7z.002
          curl.exe -L -o w11.7z.003 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W11-23H2-6060-W10UI-3/W1123H26060ESDISOW10UI.7z.003
          curl.exe -L -o w11.7z.004 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W11-23H2-6060-W10UI-3/W1123H26060ESDISOW10UI.7z.004

          curl.exe -L -o w10.7z.001 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W10-22H2-6456-W10UI-3/W1022H26456ESDISOW10UI.7z.001
          curl.exe -L -o w10.7z.002 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W10-22H2-6456-W10UI-3/W1022H26456ESDISOW10UI.7z.002
          curl.exe -L -o w10.7z.003 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W10-22H2-6456-W10UI-3/W1022H26456ESDISOW10UI.7z.003

          curl.exe -L -o ltsc.7z.001 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W10-21H2-1288-W10UI-4/W1021H21288ESDISOW10UI.7z.001
          curl.exe -L -o ltsc.7z.002 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W10-21H2-1288-W10UI-4/W1021H21288ESDISOW10UI.7z.002
          curl.exe -L -o ltsc.7z.003 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W10-21H2-1288-W10UI-4/W1021H21288ESDISOW10UI.7z.003

      # =========================
      # EXTRAÇÃO
      # =========================
      - name: Extrair ISOs
        shell: cmd
        run: |
          cd work

          7z x w11.7z.001 -o..\extract\w11 -y
          7z x w10.7z.001 -o..\extract\w10 -y
          7z x ltsc.7z.001 -o..\extract\ltsc -y

          for %%i in (..\extract\w11\*.iso) do 7z x "%%i" -o..\extract\w11_iso -y
          for %%i in (..\extract\w10\*.iso) do 7z x "%%i" -o..\extract\w10_iso -y
          for %%i in (..\extract\ltsc\*.iso) do 7z x "%%i" -o..\extract\ltsc_iso -y

      # =========================
      # EXPORT AIO REAL
      # =========================
      - name: Criar install.esd AIO
        shell: cmd
        run: |
          dism /Export-Image /SourceImageFile:extract\w11_iso\sources\install.esd /SourceIndex:4 /DestinationImageFile:install.esd /Compress:recovery

          dism /Export-Image /SourceImageFile:extract\w10_iso\sources\install.esd /SourceIndex:4 /DestinationImageFile:install.esd /Compress:recovery

          dism /Export-Image /SourceImageFile:extract\ltsc_iso\sources\install.esd /SourceIndex:1 /DestinationImageFile:install.esd /Compress:recovery

      # =========================
      # PREPARAR ISO BASE
      # =========================
      - name: Montar base Windows 11
        shell: cmd
        run: |
          for %%i in (extract\w11\*.iso) do 7z x "%%i" -oiso -y

          copy /y install.esd iso\sources\install.esd

      # =========================
      # CRIAR ISO FINAL
      # =========================
      - name: Criar ISO
        shell: cmd
        run: |
          set OSC="C:\Program Files (x86)\Windows Kits\10\Assessment and Deployment Kit\Deployment Tools\amd64\Oscdimg\oscdimg.exe"

          set BIOS=iso\boot\etfsboot.com
          set EFI=iso\efi\microsoft\boot\efisys.bin

          %OSC% -m -o -u2 -udfver102 -bootdata:2#p0,e,b"%BIOS%"#pEF,e,b"%EFI%" iso pt-br_windows_11_10_pro_ltsc_aio_update_esd_w10ui.iso

      # =========================
      # COMPACTAR
      # =========================
      - name: Compactar
        shell: cmd
        run: |
          7z a -v1900m WIMAIOPROLTSC1110ESDW10UI.7z pt-br_windows_11_10_pro_ltsc_aio_update_esd_w10ui.iso

      # =========================
      # RELEASE
      # =========================
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: AIO-ISO
          files: WIMAIOPROLTSC1110ESDW10UI.7z.*

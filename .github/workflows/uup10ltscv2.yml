name: Build Windows 10 LTSC ISO v2

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - uses: actions/checkout@v4

    - name: Instalar ferramentas
      shell: cmd
      run: |
        choco install 7zip -y
        choco install aria2 -y

    # 🔽 BAIXAR W10UI
    - name: Baixar W10UI
      shell: cmd
      run: |
        curl -L -o W10UI.zip https://tiny.cc/W10UI
        7z x W10UI.zip -y

    # 🔽 BAIXAR ISO BASE
    - name: Baixar ISO base
      shell: cmd
      run: |
        curl -L -o base.7z.001 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.001
        curl -L -o base.7z.002 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.002
        curl -L -o base.7z.003 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.003

    - name: Extrair ISO
      shell: cmd
      run: |
        mkdir ISO
        7z x base.7z.001 -oISO -y

    # 🔧 CORRIGIR ISO DUPLICADA
    - name: Ajustar ISO
      shell: cmd
      run: |
        if exist ISO\ISO\sources\install.wim (
          xcopy ISO\ISO\* ISO\ /E /H /C /I /Y
        )

        if not exist ISO\sources\install.wim (
          echo ERRO: install.wim nao encontrado
          dir /s ISO
          exit /b 1
        )

    # 🔽 UUP
    - name: Extrair UUP
      shell: cmd
      run: |
        mkdir uup
        7z x uup10ltsc.zip -ouup -y

    - name: Preparar aria2
      shell: cmd
      run: |
        copy /Y "%ProgramData%\chocolatey\bin\aria2c.exe" uup\aria2c.exe

    - name: Baixar updates
      shell: cmd
      working-directory: uup
      run: |
        call uup_download_windows.cmd
        if %errorlevel% neq 0 exit /b 1

    # 🔍 DETECTAR W10UI
    - name: Detectar W10UI
      shell: cmd
      run: |
        for /d %%d in (*) do (
          if exist "%%d\W10UI.cmd" set W10PATH=%%d
        )

        if not defined W10PATH (
          echo ERRO: W10UI nao encontrado
          dir
          exit /b 1
        )

        echo W10UI: %W10PATH%

    # 🔥 PREPARAR (IGUAL SEU PC)
    - name: Preparar ambiente
      shell: cmd
      run: |
        mkdir "%W10PATH%\DVD"
        xcopy ISO\* "%W10PATH%\DVD\" /E /H /C /I /Y

        REM 🔥 AQUI MUDA TUDO (RAIZ)
        xcopy uup\* "%W10PATH%\" /E /H /C /I /Y

        dir "%W10PATH%\DVD\sources"

    # 🔥 CONFIG AUTOMÁTICA (SÓ TARGET)
    - name: Configurar W10UI
      shell: cmd
      run: |
        echo AutoStart=1> ConvertConfig.ini
        echo CreateISO=1>> ConvertConfig.ini
        echo Cleanup=1>> ConvertConfig.ini
        echo ResetBase=1>> ConvertConfig.ini
        echo NetFx3=1>> ConvertConfig.ini
        echo UpdateWinRE=1>> ConvertConfig.ini
        echo UseESD=1>> ConvertConfig.ini
        echo DVD=DVD>> ConvertConfig.ini

        copy /Y ConvertConfig.ini "%W10PATH%\ConvertConfig.ini"

    # 🔥 EXECUTAR
    - name: Rodar W10UI
      shell: cmd
      run: |
        pushd "%W10PATH%"
        call W10UI.cmd
        popd

    # 🔍 ISO FINAL
    - name: Localizar ISO
      shell: cmd
      run: |
        for /r %%i in (*.iso) do set ISOFILE=%%i

        if not defined ISOFILE (
          echo ISO NAO ENCONTRADA
          dir /s
          exit /b 1
        )

        move /Y "%ISOFILE%" FINAL.iso

    # 📦 COMPACTAR
    - name: Compactar
      shell: cmd
      run: |
        7z a -tzip -v1900m FINAL.zip FINAL.iso

    # 🚀 RELEASE
    - name: Criar Release
      uses: ncipollo/release-action@v1
      with:
        tag: ltsc-${{ github.run_number }}
        name: Windows 10 LTSC Atualizado
        artifacts: FINAL.zip.*
        token: ${{ secrets.GITHUB_TOKEN }}

name: Build Windows 10 LTSC (W10UI FINAL OK)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - uses: actions/checkout@v4

    # 🔧 TOOLS
    - name: Instalar ferramentas
      shell: cmd
      run: |
        choco install 7zip -y
        choco install aria2 -y

    # 🚀 DOWNLOAD DAS 3 PARTES (GITHUB)
    - name: Baixar base
      shell: cmd
      run: |
        aria2c -x 16 -s 16 -k 1M --file-allocation=none ^
          -o base.7z.001 ^
          https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.001

        aria2c -x 16 -s 16 -k 1M --file-allocation=none ^
          -o base.7z.002 ^
          https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.002

        aria2c -x 16 -s 16 -k 1M --file-allocation=none ^
          -o base.7z.003 ^
          https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.003

        echo ===== VERIFICAR =====
        dir *.7z.*

    # 🔍 TESTAR INTEGRIDADE
    - name: Testar arquivo
      shell: cmd
      run: |
        7z t base.7z.001
        if %errorlevel% neq 0 exit /b 1

    # 📦 EXTRAIR BASE
    - name: Extrair base
      shell: cmd
      run: |
        mkdir BASE
        7z x base.7z.001 -oBASE -y

        echo ===== DEBUG BASE =====
        dir BASE
        dir BASE\Files
        dir BASE\Files\ISO

    # 🔽 W10UI
    - name: Baixar W10UI
      shell: cmd
      run: |
        aria2c -x 8 -s 8 -o W10UI.zip https://tiny.cc/W10UI
        7z x W10UI.zip -y

    # 🔽 UUP
    - name: Extrair UUP
      shell: cmd
      run: |
        mkdir uup
        7z x uup10ltsc.zip -ouup -y

    - name: Preparar aria2
      shell: cmd
      run: |
        copy /Y "%ProgramData%\chocolatey\bin\aria2c.exe" uup\aria2c.exe

    - name: Baixar updates
      shell: cmd
      working-directory: uup
      run: |
        call uup_download_windows.cmd
        if %errorlevel% neq 0 exit /b 1

    # 🔍 DETECTAR W10UI
    - name: Detectar W10UI
      shell: cmd
      run: |
        for /d %%d in (*) do (
          if exist "%%d\W10UI.cmd" set W10PATH=%%d
        )

        if not defined W10PATH (
          echo ERRO: W10UI nao encontrado
          dir
          exit /b 1
        )

        echo W10UI encontrado em: %W10PATH%

    # 🔥 PREPARAR AMBIENTE (CORRETO)
    - name: Preparar ambiente
      shell: cmd
      run: |
        mkdir "%W10PATH%\DVD"

        REM BASE JA EXTRAIDA (SEM ISO)
        xcopy BASE\Files\ISO\* "%W10PATH%\DVD\" /E /H /C /I /Y

        REM UPDATES NA RAIZ
        xcopy uup\* "%W10PATH%\" /E /H /C /I /Y

        dir "%W10PATH%\DVD\sources"

    # ⚙️ CONFIG AUTOMÁTICA
    - name: Configurar W10UI
      shell: cmd
      run: |
        echo AutoStart=1> cfg.ini
        echo CreateISO=1>> cfg.ini
        echo Cleanup=1>> cfg.ini
        echo ResetBase=1>> cfg.ini
        echo NetFx3=1>> cfg.ini
        echo UpdateWinRE=1>> cfg.ini
        echo UseESD=1>> cfg.ini
        echo DVD=DVD>> cfg.ini

        copy /Y cfg.ini "%W10PATH%\ConvertConfig.ini"

    # 🚀 EXECUTAR
    - name: Rodar W10UI
      shell: cmd
      run: |
        pushd "%W10PATH%"
        call W10UI.cmd
        popd

    # 🔍 ISO FINAL
    - name: Localizar ISO final
      shell: cmd
      run: |
        for /r %%i in (*.iso) do set ISOFILE=%%i

        if not defined ISOFILE (
          echo ERRO: ISO final nao encontrada
          dir /s
          exit /b 1
        )

        echo ISO FINAL: %ISOFILE%
        move /Y "%ISOFILE%" FINAL.iso

    # 📦 COMPACTAR
    - name: Compactar ISO
      shell: cmd
      run: |
        7z a -tzip -v1900m FINAL.zip FINAL.iso

    # 🚀 RELEASE
    - name: Criar Release
      uses: ncipollo/release-action@v1
      with:
        tag: ltsc-${{ github.run_number }}
        name: Windows 10 LTSC Atualizado
        artifacts: FINAL.zip.*
        token: ${{ secrets.GITHUB_TOKEN }}

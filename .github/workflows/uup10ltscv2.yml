name: Build Windows 10 LTSC ISO (GitHub FAST)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - uses: actions/checkout@v4

    # 🔧 TOOLS
    - name: Instalar ferramentas
      shell: cmd
      run: |
        choco install 7zip -y
        choco install aria2 -y

    # 🚀 DOWNLOAD TURBO (3 PARTES DO GITHUB)
    - name: Baixar base (aria2 ultra)
      shell: cmd
      run: |
        aria2c ^
          -x 16 -s 16 -k 1M ^
          --file-allocation=none ^
          --max-connection-per-server=16 ^
          --min-split-size=1M ^
          --retry-wait=3 ^
          --max-tries=5 ^
          https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.001 ^
          https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.002 ^
          https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.003

        echo ===== VERIFICAR =====
        dir *.7z.*

    # 📦 EXTRAIR MULTIPART (ISO VAI SAIR AQUI)
    - name: Extrair pacote
      shell: cmd
      run: |
        mkdir BASE
        7z x Win10LTSC21H2Base.7z.001 -oBASE -y

        echo ===== DEBUG BASE =====
        dir BASE /s

    # 🔍 LOCALIZAR ISO DENTRO DO PACOTE
    - name: Encontrar ISO
      shell: cmd
      run: |
        echo ===== PROCURANDO ISO =====

        for /r BASE %%i in (*.iso) do (
          echo ISO encontrada: %%i
          set ISOFILE=%%i
          goto :found
        )

        echo ERRO: ISO nao encontrada
        dir BASE /s
        exit /b 1

        :found
        echo ISO FINAL: %ISOFILE%

        mkdir ISO
        7z x "%ISOFILE%" -oISO -y

        if not exist ISO\sources\install.wim (
          if not exist ISO\sources\install.esd (
            echo ERRO: install.wim/esd nao encontrado
            dir /s ISO
            exit /b 1
          )
        )

    # 🔽 W10UI
    - name: Baixar W10UI
      shell: cmd
      run: |
        aria2c -x 8 -s 8 -o W10UI.zip https://tiny.cc/W10UI
        7z x W10UI.zip -y

    # 🔽 UUP
    - name: Extrair UUP
      shell: cmd
      run: |
        mkdir uup
        7z x uup10ltsc.zip -ouup -y

    - name: Preparar aria2 (UUP)
      shell: cmd
      run: |
        copy /Y "%ProgramData%\chocolatey\bin\aria2c.exe" uup\aria2c.exe

    - name: Baixar updates
      shell: cmd
      working-directory: uup
      run: |
        call uup_download_windows.cmd
        if %errorlevel% neq 0 exit /b 1

    # 🔍 DETECTAR W10UI
    - name: Detectar W10UI
      shell: cmd
      run: |
        for /d %%d in (*) do (
          if exist "%%d\W10UI.cmd" set W10PATH=%%d
        )

        if not defined W10PATH (
          echo ERRO: W10UI nao encontrado
          dir
          exit /b 1
        )

        echo W10UI: %W10PATH%

    # 🔧 PREPARAR AMBIENTE
    - name: Preparar ambiente
      shell: cmd
      run: |
        mkdir "%W10PATH%\DVD"
        xcopy ISO\* "%W10PATH%\DVD\" /E /H /C /I /Y

        REM updates na raiz
        xcopy uup\* "%W10PATH%\" /E /H /C /I /Y

        dir "%W10PATH%\DVD\sources"

    # ⚙️ CONFIG AUTOMÁTICA
    - name: Configurar W10UI
      shell: cmd
      run: |
        echo AutoStart=1> cfg.ini
        echo CreateISO=1>> cfg.ini
        echo Cleanup=1>> cfg.ini
        echo ResetBase=1>> cfg.ini
        echo NetFx3=1>> cfg.ini
        echo UpdateWinRE=1>> cfg.ini
        echo UseESD=1>> cfg.ini
        echo DVD=DVD>> cfg.ini

        copy /Y cfg.ini "%W10PATH%\ConvertConfig.ini"

    # 🚀 EXECUTAR
    - name: Rodar W10UI
      shell: cmd
      run: |
        pushd "%W10PATH%"
        call W10UI.cmd
        popd

    # 🔍 ISO FINAL
    - name: Localizar ISO final
      shell: cmd
      run: |
        for /r %%i in (*.iso) do set ISOFILE=%%i

        if not defined ISOFILE (
          echo ERRO: ISO final nao encontrada
          dir /s
          exit /b 1
        )

        move /Y "%ISOFILE%" FINAL.iso

    # 📦 COMPACTAR
    - name: Compactar ISO
      shell: cmd
      run: |
        7z a -tzip -v1900m FINAL.zip FINAL.iso

    # 🚀 RELEASE
    - name: Criar Release
      uses: ncipollo/release-action@v1
      with:
        tag: ltsc-${{ github.run_number }}
        artifacts: FINAL.zip.*
        token: ${{ secrets.GITHUB_TOKEN }}

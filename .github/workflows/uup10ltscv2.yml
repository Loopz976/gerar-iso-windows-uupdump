name: Build Windows 10 LTSC ISO (W10UI FINAL AUTO ISO)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - uses: actions/checkout@v4

    - name: Instalar ferramentas
      shell: cmd
      run: |
        choco install 7zip -y
        choco install aria2 -y

    # 🔽 DOWNLOAD ISO BASE
    - name: Baixar ISO base
      shell: cmd
      run: |
        curl -L -o base.7z.001 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.001
        curl -L -o base.7z.002 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.002
        curl -L -o base.7z.003 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.003

    # 🔥 EXTRAIR TUDO
    - name: Extrair pacote
      shell: cmd
      run: |
        mkdir ISO
        7z x base.7z.001 -oISO -y

        echo ===== DEBUG ISO =====
        dir ISO /s

    # 🔥 LOCALIZAR ISO AUTOMATICAMENTE
    - name: Encontrar ISO
      shell: cmd
      run: |
        echo ===== PROCURANDO ISO =====

        for /r %%i in (*.iso) do (
          echo ISO encontrada: %%i
          set ISOFILE=%%i
          goto :found
        )

        echo ERRO: ISO nao encontrada
        exit /b 1

        :found
        echo ISO FINAL: %ISOFILE%

        mkdir ISO_EXTRACT
        7z x "%ISOFILE%" -oISO_EXTRACT -y

        if not exist ISO_EXTRACT\sources\install.wim (
          if not exist ISO_EXTRACT\sources\install.esd (
            echo ERRO: install.wim/esd nao encontrado
            dir /s ISO_EXTRACT
            exit /b 1
          )
        )

    # 🔽 W10UI
    - name: Baixar W10UI
      shell: cmd
      run: |
        curl -L -o W10UI.zip https://tiny.cc/W10UI
        7z x W10UI.zip -y

    # 🔽 UUP
    - name: Extrair UUP
      shell: cmd
      run: |
        mkdir uup
        7z x uup10ltsc.zip -ouup -y

    - name: Preparar aria2
      shell: cmd
      run: |
        copy /Y "%ProgramData%\chocolatey\bin\aria2c.exe" uup\aria2c.exe

    - name: Baixar updates
      shell: cmd
      working-directory: uup
      run: |
        call uup_download_windows.cmd
        if %errorlevel% neq 0 exit /b 1

    # 🔍 DETECTAR W10UI
    - name: Detectar W10UI
      shell: cmd
      run: |
        for /d %%d in (*) do (
          if exist "%%d\W10UI.cmd" set W10PATH=%%d
        )

        if not defined W10PATH (
          echo ERRO: W10UI nao encontrado
          dir
          exit /b 1
        )

    # 🔥 PREPARAR
    - name: Preparar ambiente
      shell: cmd
      run: |
        mkdir "%W10PATH%\DVD"
        xcopy ISO_EXTRACT\* "%W10PATH%\DVD\" /E /H /C /I /Y

        xcopy uup\* "%W10PATH%\" /E /H /C /I /Y

        dir "%W10PATH%\DVD\sources"

    # 🔥 CONFIG AUTO
    - name: Configurar W10UI
      shell: cmd
      run: |
        echo AutoStart=1> cfg.ini
        echo CreateISO=1>> cfg.ini
        echo Cleanup=1>> cfg.ini
        echo ResetBase=1>> cfg.ini
        echo NetFx3=1>> cfg.ini
        echo UpdateWinRE=1>> cfg.ini
        echo UseESD=1>> cfg.ini
        echo DVD=DVD>> cfg.ini

        copy /Y cfg.ini "%W10PATH%\ConvertConfig.ini"

    # 🔥 EXECUTAR
    - name: Rodar W10UI
      shell: cmd
      run: |
        pushd "%W10PATH%"
        call W10UI.cmd
        popd

    # 🔍 ISO FINAL
    - name: Localizar ISO final
      shell: cmd
      run: |
        for /r %%i in (*.iso) do set ISOFILE=%%i

        if not defined ISOFILE (
          echo ERRO: ISO final nao encontrada
          dir /s
          exit /b 1
        )

        move /Y "%ISOFILE%" FINAL.iso

    # 📦 COMPACTAR
    - name: Compactar
      shell: cmd
      run: |
        7z a -tzip -v1900m FINAL.zip FINAL.iso

    # 🚀 RELEASE
    - name: Criar Release
      uses: ncipollo/release-action@v1
      with:
        tag: ltsc-${{ github.run_number }}
        artifacts: FINAL.zip.*
        token: ${{ secrets.GITHUB_TOKEN }}

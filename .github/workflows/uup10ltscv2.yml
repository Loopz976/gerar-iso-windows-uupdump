name: Build Win10 ISO (W10UI FULL AUTO)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Instalar ferramentas
        shell: powershell
        run: |
          choco install 7zip -y
          choco install aria2 -y

      - name: Baixar base
        shell: powershell
        run: |
          aria2c -x 16 -s 16 -k 1M --file-allocation=none -o filesw10.zip.001 https://github.com/Loopz976/win10-iso-auto-builder/releases/download/files-win10/filesw10.zip.001
          aria2c -x 16 -s 16 -k 1M --file-allocation=none -o filesw10.zip.002 https://github.com/Loopz976/win10-iso-auto-builder/releases/download/files-win10/filesw10.zip.002
          aria2c -x 16 -s 16 -k 1M --file-allocation=none -o filesw10.zip.003 https://github.com/Loopz976/win10-iso-auto-builder/releases/download/files-win10/filesw10.zip.003

      - name: Reconstruir ZIP
        shell: cmd
        run: |
          copy /b filesw10.zip.001 + filesw10.zip.002 + filesw10.zip.003 filesw10.zip
          if not exist filesw10.zip exit /b 1

      - name: Extrair base
        shell: powershell
        run: |
          $root = "D:\W10UI"
          if (Test-Path $root) { cmd /c rmdir /s /q $root }
          New-Item -ItemType Directory -Path $root | Out-Null
          Expand-Archive filesw10.zip -DestinationPath $root -Force

      - name: Encontrar Files
        id: files
        shell: powershell
        run: |
          $dir = Get-ChildItem D:\W10UI -Recurse -Directory | Where-Object {$_.Name -eq "Files"} | Select-Object -First 1
          if (!$dir) { throw "Files nao encontrada" }
          "dir=$($dir.FullName)" >> $env:GITHUB_OUTPUT

      - name: Encontrar ISO
        id: iso
        shell: powershell
        run: |
          $iso = Get-ChildItem "${{ steps.files.outputs.dir }}" -Recurse -Filter *.iso | Sort Length -Descending | Select -First 1
          if (!$iso) { throw "ISO nao encontrada" }
          "iso=$($iso.FullName)" >> $env:GITHUB_OUTPUT

      - name: Extrair ISO
        id: target
        shell: powershell
        run: |
          $dest = "D:\BASEISO"
          if (Test-Path $dest) { cmd /c rmdir /s /q $dest }
          & "C:\Program Files\7-Zip\7z.exe" x "${{ steps.iso.outputs.iso }}" "-o$dest" -y
          if (!(Test-Path "$dest\sources\boot.wim")) { throw "ISO invalida" }
          "root=$dest" >> $env:GITHUB_OUTPUT

      - name: Garantir install.wim
        shell: powershell
        run: |
          $src = "${{ steps.target.outputs.root }}\sources"
          if (!(Test-Path "$src\install.wim")) {
            if (Test-Path "$src\install.esd") {
              dism /Export-Image /SourceImageFile:"$src\install.esd" /All /DestinationImageFile:"$src\install.wim" /Compress:max /CheckIntegrity
            } else {
              throw "install.wim/esd nao encontrado"
            }
          }

      - name: Criar dirs
        id: dirs
        shell: powershell
        run: |
          $cab="D:\CAB";$mnt="D:\MNT";$re="D:\RE";$iso="D:\ISO"
          foreach($p in @($cab,$mnt,$re,$iso)){
            if(Test-Path $p){cmd /c rmdir /s /q $p}
            New-Item -ItemType Directory -Path $p|Out-Null
          }
          "cab=$cab" >> $env:GITHUB_OUTPUT
          "mnt=$mnt" >> $env:GITHUB_OUTPUT
          "re=$re" >> $env:GITHUB_OUTPUT
          "iso=$iso" >> $env:GITHUB_OUTPUT

      - name: Ajustar W10UI.ini
        shell: powershell
        run: |
          $ini = Get-ChildItem "${{ steps.files.outputs.dir }}" -Recurse -Filter W10UI.ini | Select -First 1
          if (!$ini) { throw "W10UI.ini nao encontrado" }

          $txt = Get-Content $ini -Raw

          $txt = $txt -replace '(?im)^Target\s*=.*$',"Target=${{ steps.target.outputs.root }}"
          $txt = $txt -replace '(?im)^_CabDir\s*=.*$',"_CabDir=${{ steps.dirs.outputs.cab }}"
          $txt = $txt -replace '(?im)^MountDir\s*=.*$',"MountDir=${{ steps.dirs.outputs.mnt }}"
          $txt = $txt -replace '(?im)^WinreMount\s*=.*$',"WinreMount=${{ steps.dirs.outputs.re }}"
          $txt = $txt -replace '(?im)^ISODir\s*=.*$',"ISODir=${{ steps.dirs.outputs.iso }}"
          $txt = $txt -replace '(?im)^AutoStart\s*=.*$',"AutoStart=1"
          $txt = $txt -replace '(?im)^AddUpdates\s*=.*$',"AddUpdates=1"
          $txt = $txt -replace '(?im)^Cleanup\s*=.*$',"Cleanup=1"
          $txt = $txt -replace '(?im)^ResetBase\s*=.*$',"ResetBase=1"
          $txt = $txt -replace '(?im)^NetFx3\s*=.*$',"NetFx3=1"
          $txt = $txt -replace '(?im)^UpdateWinRE\s*=.*$',"UpdateWinRE=1"
          $txt = $txt -replace '(?im)^UseESD\s*=.*$',"UseESD=1"
          $txt = $txt -replace '(?im)^ISO\s*=.*$',"ISO=1"

          Set-Content $ini $txt -Encoding ASCII

      - name: Limpeza DISM
        shell: powershell
        run: |
          dism /Cleanup-Wim

      - name: Rodar W10UI
        shell: cmd
        working-directory: ${{ steps.files.outputs.dir }}
        run: |
          call W10UI.cmd

      - name: Encontrar ISO final
        id: final
        shell: powershell
        run: |
          $iso = Get-ChildItem "${{ steps.dirs.outputs.iso }}" -Recurse -Filter *.iso | Sort LastWriteTime -Descending | Select -First 1
          if (!$iso) { throw "ISO final nao encontrada" }
          "iso=$($iso.FullName)" >> $env:GITHUB_OUTPUT

      - name: Compactar ISO
        shell: powershell
        run: |
          & "C:\Program Files\7-Zip\7z.exe" a -tzip -v1800m ISO_PARTS.zip "${{ steps.final.outputs.iso }}"

      - name: Criar release
        uses: ncipollo/release-action@v1
        with:
          tag: build-${{ github.run_id }}
          name: Win10 ISO Build
          artifacts: ISO_PARTS.zip*
          token: ${{ github.token }}

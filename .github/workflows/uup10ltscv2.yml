name: Build Windows 10 LTSC ISO (W10UI)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - uses: actions/checkout@v4

    - name: Instalar ferramentas
      shell: cmd
      run: |
        choco install 7zip -y
        choco install aria2 -y

    # 🔽 W10UI
    - name: Baixar W10UI
      shell: cmd
      run: |
        curl -L -o W10UI.zip https://tiny.cc/W10UI
        7z x W10UI.zip -y

    # 🔽 ISO BASE
    - name: Baixar ISO base
      shell: cmd
      run: |
        curl -L -o base.7z.001 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.001
        curl -L -o base.7z.002 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.002
        curl -L -o base.7z.003 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.003

    - name: Extrair ISO
      shell: cmd
      run: |
        mkdir ISO
        7z x base.7z.001 -oISO -y

        echo ===== DEBUG ISO =====
        dir ISO

    # 🔥 NORMALIZAR ISO (resolve ISO dentro de ISO)
    - name: Ajustar estrutura ISO
      shell: cmd
      run: |
        if exist ISO\ISO\sources\install.wim (
          echo Corrigindo ISO duplicada...
          xcopy ISO\ISO\* ISO\ /E /H /C /I /Y
        )

        if not exist ISO\sources\install.wim (
          echo ERRO: install.wim nao encontrado
          dir /s ISO
          exit /b 1
        )

    # 🔽 UUP
    - name: Extrair UUP
      shell: cmd
      run: |
        mkdir uup
        7z x uup10ltsc.zip -ouup -y

        if not exist uup\uup_download_windows.cmd (
          echo ERRO: Script UUP nao encontrado
          exit /b 1
        )

    - name: Preparar aria2
      shell: cmd
      run: |
        copy /Y "%ProgramData%\chocolatey\bin\aria2c.exe" uup\aria2c.exe

    - name: Baixar updates
      shell: cmd
      working-directory: uup
      run: |
        call uup_download_windows.cmd
        if %errorlevel% neq 0 exit /b 1

    # 🔥 PREPARAR W10UI
    - name: Preparar W10UI
      shell: cmd
      run: |
        echo ===== PREPARANDO W10UI =====

        for /d %%d in (*) do (
          if exist "%%d\W10UI.cmd" set W10PATH=%%d
        )

        if not defined W10PATH (
          echo ERRO: W10UI nao encontrado
          dir
          exit /b 1
        )

        echo W10UI em: %W10PATH%

        mkdir "%W10PATH%\DVD"
        xcopy ISO\* "%W10PATH%\DVD\" /E /H /C /I /Y

        mkdir "%W10PATH%\Files\UUPs"
        xcopy uup\* "%W10PATH%\Files\UUPs\" /E /H /C /I /Y

        echo ===== DEBUG FINAL =====
        dir "%W10PATH%\DVD\sources"

    # 🔥 RODAR W10UI (SEM PARAMETRO)
    - name: Rodar W10UI
      shell: cmd
      run: |
        echo ===== EXECUTANDO W10UI =====

        for /r %%i in (W10UI.cmd) do (
          pushd %%~dpi
          call W10UI.cmd
          popd
          goto :done
        )

        echo ERRO: W10UI.cmd nao encontrado
        exit /b 1

        :done

    # 🔍 ISO FINAL
    - name: Localizar ISO
      shell: cmd
      run: |
        for /r %%i in (*.iso) do set ISOFILE=%%i

        if not defined ISOFILE (
          echo ISO NAO ENCONTRADA
          dir /s
          exit /b 1
        )

        echo ISO FINAL: %ISOFILE%
        move /Y "%ISOFILE%" FINAL.iso

    # 📦 COMPACTAR
    - name: Compactar
      shell: cmd
      run: |
        7z a -tzip -v1900m FINAL.zip FINAL.iso

    # 🚀 RELEASE
    - name: Criar Release
      uses: ncipollo/release-action@v1
      with:
        tag: ltsc-${{ github.run_number }}
        name: Windows 10 LTSC Atualizado
        artifacts: FINAL.zip.*
        token: ${{ secrets.GITHUB_TOKEN }}

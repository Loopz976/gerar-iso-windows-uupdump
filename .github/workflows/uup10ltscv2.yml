name: Build Windows 10 LTSC ISO (FAST W10UI)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - uses: actions/checkout@v4

    # 🔧 TOOLS
    - name: Instalar ferramentas
      shell: cmd
      run: |
        choco install 7zip -y
        choco install aria2 -y

    # 🚀 DOWNLOAD ULTRA RÁPIDO
    - name: Baixar ISO (aria2 turbo)
      shell: cmd
      run: |
        aria2c ^
          -x 16 ^
          -s 16 ^
          -k 1M ^
          --file-allocation=none ^
          --summary-interval=0 ^
          --max-connection-per-server=16 ^
          --min-split-size=1M ^
          --retry-wait=3 ^
          --max-tries=5 ^
          -o windows.iso ^
          https://windows.timefa.de/10/ltsc/pt-br_windows_10_enterprise_ltsc_2021_x64_dvd_f318268e.iso

        echo ===== VERIFICAR ISO =====
        dir windows.iso

    # 📦 EXTRAIR ISO
    - name: Extrair ISO
      shell: cmd
      run: |
        mkdir ISO
        7z x windows.iso -oISO -y

        if not exist ISO\sources\install.wim (
          if not exist ISO\sources\install.esd (
            echo ERRO: install.wim/esd nao encontrado
            dir /s ISO
            exit /b 1
          )
        )

    # 🔽 W10UI
    - name: Baixar W10UI
      shell: cmd
      run: |
        aria2c -x 8 -s 8 -o W10UI.zip https://tiny.cc/W10UI
        7z x W10UI.zip -y

    # 🔽 UUP
    - name: Extrair UUP
      shell: cmd
      run: |
        mkdir uup
        7z x uup10ltsc.zip -ouup -y

    - name: Preparar aria2 (UUP)
      shell: cmd
      run: |
        copy /Y "%ProgramData%\chocolatey\bin\aria2c.exe" uup\aria2c.exe

    - name: Baixar updates
      shell: cmd
      working-directory: uup
      run: |
        call uup_download_windows.cmd
        if %errorlevel% neq 0 exit /b 1

    # 🔍 DETECTAR W10UI
    - name: Detectar W10UI
      shell: cmd
      run: |
        for /d %%d in (*) do (
          if exist "%%d\W10UI.cmd" set W10PATH=%%d
        )

        if not defined W10PATH (
          echo ERRO: W10UI nao encontrado
          dir
          exit /b 1
        )

        echo W10UI encontrado em: %W10PATH%

    # 🔧 PREPARAR
    - name: Preparar ambiente
      shell: cmd
      run: |
        mkdir "%W10PATH%\DVD"
        xcopy ISO\* "%W10PATH%\DVD\" /E /H /C /I /Y

        REM updates na raiz (igual seu método)
        xcopy uup\* "%W10PATH%\" /E /H /C /I /Y

        dir "%W10PATH%\DVD\sources"

    # ⚙️ CONFIG AUTOMÁTICA
    - name: Configurar W10UI
      shell: cmd
      run: |
        echo AutoStart=1> cfg.ini
        echo CreateISO=1>> cfg.ini
        echo Cleanup=1>> cfg.ini
        echo ResetBase=1>> cfg.ini
        echo NetFx3=1>> cfg.ini
        echo UpdateWinRE=1>> cfg.ini
        echo UseESD=1>> cfg.ini
        echo DVD=DVD>> cfg.ini

        copy /Y cfg.ini "%W10PATH%\ConvertConfig.ini"

    # 🚀 EXECUTAR
    - name: Rodar W10UI
      shell: cmd
      run: |
        pushd "%W10PATH%"
        call W10UI.cmd
        popd

    # 🔍 ISO FINAL
    - name: Localizar ISO final
      shell: cmd
      run: |
        for /r %%i in (*.iso) do set ISOFILE=%%i

        if not defined ISOFILE (
          echo ERRO: ISO final nao encontrada
          dir /s
          exit /b 1
        )

        echo ISO FINAL: %ISOFILE%
        move /Y "%ISOFILE%" FINAL.iso

    # 📦 COMPACTAR
    - name: Compactar ISO
      shell: cmd
      run: |
        7z a -tzip -v1900m FINAL.zip FINAL.iso

    # 🚀 RELEASE
    - name: Criar Release
      uses: ncipollo/release-action@v1
      with:
        tag: ltsc-${{ github.run_number }}
        name: Windows 10 LTSC Atualizado
        artifacts: FINAL.zip.*
        token: ${{ secrets.GITHUB_TOKEN }}

name: Build ISO W10UI (FINAL CORRIGIDO) v3

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:
    - uses: actions/checkout@v4

    - name: LIMPAR AMBIENTE TOTAL
      shell: cmd
      run: |
        rmdir /s /q BASE 2>nul
        rmdir /s /q UUP 2>nul
        del /f /q *.iso 2>nul
        del /f /q *.wim 2>nul
        del /f /q *.esd 2>nul

    - name: Instalar ferramentas
      shell: cmd
      run: |
        choco install 7zip -y
        choco install aria2 -y

    - name: Extrair W10UI base
      shell: cmd
      run: |
        mkdir BASE
        7z x W10UI_RAIZ.zip -oBASE -y

        if not exist BASE\Files\W10UI.cmd (
          echo ERRO: W10UI nao encontrado
          exit /b 1
        )

    - name: Baixar ISO LTSC (3 partes)
      shell: cmd
      run: |
        aria2c -x16 -s16 -k1M --file-allocation=none -o base.7z.001 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-1288/w10-ltsc-1288.7z.001
        aria2c -x16 -s16 -k1M --file-allocation=none -o base.7z.002 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-1288/w10-ltsc-1288.7z.002
        aria2c -x16 -s16 -k1M --file-allocation=none -o base.7z.003 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-1288/w10-ltsc-1288.7z.003

    - name: Extrair ISO do pacote
      shell: cmd
      run: |
        7z x base.7z.001 -y

        if not exist "pt-br_windows_10_enterprise_ltsc_2021_x64_dvd_f318268e.iso" (
          echo ERRO: ISO nao encontrada
          dir /s
          exit /b 1
        )

    - name: Extrair ISO para TARGET
      shell: cmd
      run: |
        mkdir BASE\Files\DVD10UI
        7z x "pt-br_windows_10_enterprise_ltsc_2021_x64_dvd_f318268e.iso" -oBASE\Files\DVD10UI -y

    - name: VALIDAR VERSAO DO WIM
      shell: cmd
      run: |
        dism /Get-WimInfo /WimFile:BASE\Files\DVD10UI\sources\install.wim

    - name: Preparar UUP
      shell: cmd
      run: |
        mkdir UUP
        7z x uup10ltsc.zip -oUUP -y

        copy /y "%ProgramData%\chocolatey\bin\aria2c.exe" UUP\files\aria2c.exe

    - name: Baixar updates
      shell: cmd
      working-directory: UUP
      run: |
        call uup_download_windows.cmd

    - name: Copiar updates
      shell: cmd
      run: |
        xcopy UUP\UUPs\* BASE\Files\ /E /H /C /I /Y

    - name: Ajustar INI
      shell: powershell
      run: |
        $ini = "BASE\Files\W10UI.ini"
        $target = (Resolve-Path "BASE\Files\DVD10UI").Path
        $repo = (Resolve-Path "BASE\Files").Path

        $txt = Get-Content $ini -Raw
        $txt = [regex]::Replace($txt, '(?im)^Target\s*=.*$', "Target=$target")
        $txt = [regex]::Replace($txt, '(?im)^Repo\s*=.*$', "Repo=$repo")

        Set-Content $ini $txt -Encoding ASCII

    - name: Limpeza DISM
      shell: cmd
      run: |
        dism /Cleanup-Wim

    - name: Rodar W10UI
      shell: cmd
      working-directory: BASE\Files
      run: |
        call W10UI.cmd

    - name: Localizar ISO final
      id: iso
      shell: powershell
      run: |
        $iso = Get-ChildItem BASE -Recurse -Filter *.iso | Sort-Object LastWriteTime -Descending | Select-Object -First 1
        if (-not $iso) { exit 1 }
        "iso=$($iso.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

    - name: Compactar ISO
      shell: cmd
      run: |
        7z a -tzip -v1900m FINAL.zip "${{ steps.iso.outputs.iso }}"

    - name: Criar release
      uses: ncipollo/release-action@v1
      with:
        tag: build-${{ github.run_number }}
        name: ISO Final W10UI
        artifacts: FINAL.zip.*
        token: ${{ secrets.GITHUB_TOKEN }}

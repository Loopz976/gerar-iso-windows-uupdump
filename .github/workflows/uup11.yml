name: Gerar ISO Windows 11 (UUP)

on:
  workflow_dispatch:

jobs:
  build_win11:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Instalar aria2
      shell: powershell
      run: |
        choco install aria2 -y

    - name: Extrair UUP (Win11)
      shell: powershell
      run: |
        New-Item -ItemType Directory -Path uup -Force
        Expand-Archive -Path "uup11.zip" -DestinationPath "uup" -Force

        if (!(Test-Path "uup\uup_download_windows.cmd")) {
          Write-Error "Script UUP não encontrado!"
          Get-ChildItem -Recurse
          exit 1
        }

    - name: Preparar aria2
      shell: powershell
      run: |
        $aria = (Get-Command aria2c).Source
        New-Item -ItemType Directory -Path "uup\files" -Force
        Copy-Item $aria "uup\files\aria2c.exe" -Force

        if (!(Test-Path "uup\files\aria2c.exe")) {
          Write-Error "aria2 não copiado corretamente!"
          exit 1
        }

    - name: Executar UUP
      shell: cmd
      working-directory: uup
      run: |
        uup_download_windows.cmd

    - name: Encontrar ISO
      id: findiso
      shell: powershell
      run: |
        $iso = Get-ChildItem -Recurse -Filter *.iso | Select-Object -First 1
        if (-not $iso) {
          Write-Error "ISO não encontrada!"
          exit 1
        }
        echo "iso_path=$($iso.FullName)" >> $env:GITHUB_OUTPUT

    - name: Compactar ISO
      shell: powershell
      run: |
        7z a -tzip -v1800m ISO_WIN11.zip "${{ steps.findiso.outputs.iso_path }}"

    - name: Criar Release
      uses: ncipollo/release-action@v1
      with:
        tag: win11-${{ github.run_number }}
        name: Windows 11 ISO
        artifacts: ISO_WIN11.zip.*
        token: ${{ secrets.GITHUB_TOKEN }}

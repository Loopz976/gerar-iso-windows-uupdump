name: Gerar ISO Windows 11 (UUP)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_win11:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Instalar dependências
      shell: powershell
      run: |
        choco install aria2 -y
        choco install 7zip -y

    - name: Extrair UUP
      shell: powershell
      run: |
        New-Item -ItemType Directory -Path uup -Force
        Expand-Archive "uup11.zip" -DestinationPath "uup" -Force

        if (!(Test-Path "uup\uup_download_windows.cmd")) {
          Write-Error "Script UUP não encontrado!"
          exit 1
        }

    - name: Preparar aria2
      shell: powershell
      run: |
        $aria = (Get-Command aria2c).Source
        New-Item -ItemType Directory -Path "uup\files" -Force
        Copy-Item $aria "uup\files\aria2c.exe" -Force

    - name: Executar UUP
      shell: cmd
      working-directory: uup
      run: uup_download_windows.cmd

    - name: Localizar ISO
      shell: powershell
      run: |
        $iso = Get-ChildItem -Recurse -Filter *.iso | Select-Object -First 1
        if (!$iso) { Write-Error "ISO não gerada"; exit 1 }

        if ($iso.Length -lt 2GB) {
          Write-Error "ISO inválida ou incompleta"
          exit 1
        }

        Move-Item $iso.FullName WIN11.iso
        Write-Host "ISO OK: $($iso.FullName)"

    - name: Compactar ISO (1900MB)
      shell: powershell
      run: |
        7z a -tzip -v1900m WIN11.zip WIN11.iso

    - name: Criar Release
      uses: ncipollo/release-action@v1
      with:
        tag: win11-${{ github.run_number }}
        name: Windows 11 ISO
        artifacts: WIN11.zip.*
        token: ${{ secrets.GITHUB_TOKEN }}

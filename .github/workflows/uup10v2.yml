name: Win10 ISO v2

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Instalar deps
      run: |
        choco install aria2 -y
        choco install 7zip -y

    - name: Extrair UUP
      shell: powershell
      run: |
        Expand-Archive uup10.zip uup -Force

    - name: Rodar UUP
      shell: cmd
      working-directory: uup
      run: |
        call uup_download_windows.cmd
        if exist convert-UUP.cmd call convert-UUP.cmd

    - name: Pegar ISO
      shell: powershell
      run: |
        $iso = Get-ChildItem -Recurse -Filter *.iso | Select-Object -First 1
        if (!$iso) { exit 1 }
        Move-Item $iso.FullName WIN10.iso

    - name: Compactar
      run: 7z a -tzip -v1900m WIN10.zip WIN10.iso

    - name: Release
      uses: ncipollo/release-action@v1
      with:
        tag: win10-${{ github.run_number }}
        artifacts: WIN10.zip.*
        token: ${{ secrets.GITHUB_TOKEN }}

name: Build ISO PT-BR

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Instalar 7-Zip
        run: choco install 7zip -y

      # 🔽 BAIXAR ISO BASE
      - name: Baixar ISO
        run: |
          curl -L -o base.iso "LINK_DA_SUA_ISO_AQUI"

      - name: Extrair ISO
        run: |
          mkdir D:\ISO
          7z x base.iso -oD:\ISO -y

      # 🔽 BAIXAR LANG.ZIP
      - name: Baixar pacotes de idioma
        run: |
          curl -L -o lang.zip "LINK_DO_SEU_LANG_ZIP"

      - name: Extrair LANG
        run: |
          7z x lang.zip -oD:\LANG -y

      # =========================
      # 🔥 BOOT.WIM (CORRETO)
      # =========================
      - name: Integrar idioma no boot.wim (index 1)
        run: |
          mkdir D:\MOUNT
          dism /Mount-Wim /WimFile:D:\ISO\sources\boot.wim /index:1 /MountDir:D:\MOUNT

          for %%i in (D:\LANG\BOOT\*.cab) do dism /Image:D:\MOUNT /Add-Package /PackagePath:"%%i"

          dism /Image:D:\MOUNT /Set-AllIntl:pt-BR
          dism /Image:D:\MOUNT /Set-InputLocale:0416:00010416

          dism /Unmount-Wim /MountDir:D:\MOUNT /Commit

      - name: Integrar idioma no boot.wim (index 2)
        run: |
          dism /Mount-Wim /WimFile:D:\ISO\sources\boot.wim /index:2 /MountDir:D:\MOUNT

          for %%i in (D:\LANG\BOOT\*.cab) do dism /Image:D:\MOUNT /Add-Package /PackagePath:"%%i"

          dism /Image:D:\MOUNT /Set-AllIntl:pt-BR
          dism /Image:D:\MOUNT /Set-InputLocale:0416:00010416

          dism /Unmount-Wim /MountDir:D:\MOUNT /Commit

      # =========================
      # 🔥 INSTALL.WIM (FIX REAL)
      # =========================
      - name: Integrar idioma no install.wim
        shell: cmd
        run: |
          for /l %%i in (1,1,10) do (
            dism /Get-WimInfo /WimFile:D:\ISO\sources\install.wim /index:%%i >nul 2>&1
            if not errorlevel 1 (
              echo ==== INDEX %%i ====

              dism /Mount-Wim /WimFile:D:\ISO\sources\install.wim /index:%%i /MountDir:D:\MOUNT

              echo Instalando Language Pack...
              for %%p in (D:\LANG\INSTALL\Microsoft-Windows-Client-Language-Pack*.cab) do dism /Image:D:\MOUNT /Add-Package /PackagePath:"%%p"

              echo Instalando FOD...
              for %%p in (D:\LANG\INSTALL\Microsoft-Windows-LanguageFeatures*.cab) do dism /Image:D:\MOUNT /Add-Package /PackagePath:"%%p"

              dism /Image:D:\MOUNT /Set-AllIntl:pt-BR
              dism /Image:D:\MOUNT /Set-InputLocale:0416:00010416

              dism /Image:D:\MOUNT /Cleanup-Image /StartComponentCleanup /ResetBase

              dism /Unmount-Wim /MountDir:D:\MOUNT /Commit
            )
          )

      # =========================
      # 🔥 GERAR ISO FINAL
      # =========================
      - name: Criar ISO final
        run: |
          oscdimg -bD:\ISO\boot\etfsboot.com -u2 -h -m -o -lWIN10_PTBR D:\ISO output.iso

      # =========================
      # 🔼 UPLOAD RELEASE
      # =========================
      - name: Upload ISO
        uses: ncipollo/release-action@v1
        with:
          artifacts: output.iso
          tag: build-${{ github.run_number }}
          name: ISO PT-BR Build ${{ github.run_number }}

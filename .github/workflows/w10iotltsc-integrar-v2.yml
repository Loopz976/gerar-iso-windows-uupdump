name: Build ISO PT-BR FULL STABLE

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Instalar ferramentas
        run: |
          choco install 7zip -y
          choco install oscdimg -y

      - name: Limpeza total
        run: |
          dism /Cleanup-Mountpoints
          rmdir /s /q D:\ISO 2>nul
          rmdir /s /q D:\MOUNT 2>nul
          rmdir /s /q D:\LANG 2>nul
          del /f /q *.iso 2>nul

      - name: Extrair ISO
        run: |
          mkdir D:\ISO
          7z x *.iso -oD:\ISO -y

      - name: Converter ESD -> WIM (se necessário)
        run: |
          if exist D:\ISO\sources\install.esd (
            dism /Export-Image /SourceImageFile:D:\ISO\sources\install.esd /SourceIndex:1 /DestinationImageFile:D:\ISO\sources\install.wim /Compress:max
          )

      - name: Extrair idioma
        run: |
          mkdir D:\LANG
          7z x lang.zip -oD:\LANG -y

      # =========================
      # BOOT.WIM
      # =========================
      - name: Integrar BOOT.WIM
        run: |
          mkdir D:\MOUNT

          for %%i in (1 2) do (
            dism /Mount-Wim /WimFile:D:\ISO\sources\boot.wim /index:%%i /MountDir:D:\MOUNT

            if exist D:\LANG\BOOT\lp.cab (
              dism /Image:D:\MOUNT /Add-Package /PackagePath:D:\LANG\BOOT\lp.cab
            )

            for %%p in (D:\LANG\BOOT\*.cab) do (
              dism /Image:D:\MOUNT /Add-Package /PackagePath:"%%p"
            )

            dism /Image:D:\MOUNT /Get-Packages | findstr /i pt-BR && (
              dism /Image:D:\MOUNT /Set-AllIntl:pt-BR
              dism /Image:D:\MOUNT /Set-InputLocale:0416:00010416
            )

            dism /Unmount-Wim /MountDir:D:\MOUNT /Commit
          )

      # =========================
      # INSTALL.WIM
      # =========================
      - name: Integrar INSTALL.WIM
        run: |
          mkdir D:\MOUNT

          for /l %%i in (1,1,10) do (
            dism /Get-WimInfo /WimFile:D:\ISO\sources\install.wim /index:%%i >nul 2>&1
            if not errorlevel 1 (

              echo ==== INDEX %%i ====

              dism /Mount-Wim /WimFile:D:\ISO\sources\install.wim /index:%%i /MountDir:D:\MOUNT

              for %%p in (D:\LANG\INSTALL\*.cab) do (
                dism /Image:D:\MOUNT /Add-Package /PackagePath:"%%p"
              )

              dism /Image:D:\MOUNT /Get-Packages | findstr /i pt-BR && (
                dism /Image:D:\MOUNT /Set-AllIntl:pt-BR
                dism /Image:D:\MOUNT /Set-InputLocale:0416:00010416
              )

              dism /Unmount-Wim /MountDir:D:\MOUNT /Commit
            )
          )

      # =========================
      # BUILD ISO
      # =========================
      - name: Criar ISO final
        run: |
          oscdimg -m -o -u2 -udfver102 D:\ISO D:\windows-ptbr.iso

      # =========================
      # RELEASE
      # =========================
      - name: Upload
        uses: ncipollo/release-action@v1
        with:
          artifacts: "D:\\windows-ptbr.iso"
          tag: "iso-final"

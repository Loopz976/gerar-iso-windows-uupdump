name: AIO Windows ISO Unified (W11 + W10)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:

  w11:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
    - uses: actions/checkout@v4

    - name: Setup W11
      shell: cmd
      run: |
        choco install 7zip aria2 -y
        mkdir D:\W10UI
        7z x W10UI_RAIZ.zip -oD:\W10UI -y

        aria2c -x16 -s16 -o base.7z.001 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w11-consumer-6060/w11-consumer-6060.7z.001
        aria2c -x16 -s16 -o base.7z.002 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w11-consumer-6060/w11-consumer-6060.7z.002
        aria2c -x16 -s16 -o base.7z.003 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w11-consumer-6060/w11-consumer-6060.7z.003
        aria2c -x16 -s16 -o base.7z.004 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w11-consumer-6060/w11-consumer-6060.7z.004

        7z x base.7z.001 -y
        mkdir D:\BASEISO
        7z x pt-br_windows_11_consumer_editions_version_23h2_updated_oct_2025_x64_dvd_8deeaabd.iso -oD:\BASEISO -y

        mkdir UUP
        7z x w11-23h2-upp.zip -oUUP -y
        copy /y "%ProgramData%\chocolatey\bin\aria2c.exe" UUP\files\aria2c.exe

    - name: Build W11
      shell: cmd
      run: |
        call UUP\uup_download_windows.cmd
        xcopy UUP\UUPs\* D:\W10UI\Files\ /E /H /C /I /Y

        mkdir D:\W10UI_TEMP D:\W10UI_MNT D:\W10UI_MRE D:\W10UI_ISO

        powershell -Command "(Get-Content D:\W10UI\Files\W10UI.ini) -replace 'Target=.*','Target=D:\BASEISO' | Set-Content D:\W10UI\Files\W10UI.ini"

        dism /Cleanup-Wim
        cd /d D:\W10UI\Files
        call W10UI.cmd

        copy /y D:\W10UI_ISO\*.iso w11.iso

    - uses: actions/upload-artifact@v4
      with:
        name: w11
        path: w11.iso


  w10_22h2:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
    - uses: actions/checkout@v4

    - name: Setup W10 22H2
      shell: cmd
      run: |
        choco install 7zip aria2 -y
        mkdir D:\W10UI
        7z x W10UI_RAIZ.zip -oD:\W10UI -y

        aria2c -x16 -s16 -o base.7z.001 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-consumer-6456/w10-consumer-6456.7z.001
        aria2c -x16 -s16 -o base.7z.002 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-consumer-6456/w10-consumer-6456.7z.002
        aria2c -x16 -s16 -o base.7z.003 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-consumer-6456/w10-consumer-6456.7z.003
        aria2c -x16 -s16 -o base.7z.004 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-consumer-6456/w10-consumer-6456.7z.004

        7z x base.7z.001 -y
        mkdir D:\BASEISO
        7z x pt-br_windows_10_consumer_editions_version_22h2_updated_oct_2025_x64_dvd_38efd00d.iso -oD:\BASEISO -y

        mkdir UUP
        7z x w10-22h2-upp.zip -oUUP -y
        copy /y "%ProgramData%\chocolatey\bin\aria2c.exe" UUP\files\aria2c.exe

    - name: Build W10 22H2
      shell: cmd
      run: |
        call UUP\uup_download_windows.cmd
        xcopy UUP\UUPs\* D:\W10UI\Files\ /E /H /C /I /Y

        mkdir D:\W10UI_TEMP D:\W10UI_MNT D:\W10UI_MRE D:\W10UI_ISO

        powershell -Command "(Get-Content D:\W10UI\Files\W10UI.ini) -replace 'Target=.*','Target=D:\BASEISO' | Set-Content D:\W10UI\Files\W10UI.ini"

        dism /Cleanup-Wim
        cd /d D:\W10UI\Files
        call W10UI.cmd

        copy /y D:\W10UI_ISO\*.iso w10_22h2.iso

    - uses: actions/upload-artifact@v4
      with:
        name: w10_22h2
        path: w10_22h2.iso


  w10_21h2:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
    - uses: actions/checkout@v4

    - name: Setup W10 21H2
      shell: cmd
      run: |
        choco install 7zip aria2 -y
        mkdir D:\W10UI
        7z x W10UI_RAIZ.zip -oD:\W10UI -y

        aria2c -x16 -s16 -o base.7z.001 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-1288/w10-ltsc-1288.7z.001
        aria2c -x16 -s16 -o base.7z.002 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-1288/w10-ltsc-1288.7z.002
        aria2c -x16 -s16 -o base.7z.003 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-1288/w10-ltsc-1288.7z.003

        7z x base.7z.001 -y
        mkdir D:\BASEISO
        7z x pt-br_windows_10_enterprise_ltsc_2021_x64_dvd_f318268e.iso -oD:\BASEISO -y

        mkdir UUP
        7z x w10-21h2-upp.zip -oUUP -y
        copy /y "%ProgramData%\chocolatey\bin\aria2c.exe" UUP\files\aria2c.exe

    - name: Build W10 21H2
      shell: cmd
      run: |
        call UUP\uup_download_windows.cmd
        xcopy UUP\UUPs\* D:\W10UI\Files\ /E /H /C /I /Y

        mkdir D:\W10UI_TEMP D:\W10UI_MNT D:\W10UI_MRE D:\W10UI_ISO

        powershell -Command "(Get-Content D:\W10UI\Files\W10UI.ini) -replace 'Target=.*','Target=D:\BASEISO' | Set-Content D:\W10UI\Files\W10UI.ini"

        dism /Cleanup-Wim
        cd /d D:\W10UI\Files
        call W10UI.cmd

        copy /y D:\W10UI_ISO\*.iso w10_21h2.iso

    - uses: actions/upload-artifact@v4
      with:
        name: w10_21h2
        path: w10_21h2.iso


  final:
    runs-on: windows-latest
    needs: [w11, w10_22h2, w10_21h2]
    timeout-minutes: 360

    steps:
    - uses: actions/checkout@v4

    - name: Install tools
      run: choco install 7zip -y

    - uses: actions/download-artifact@v4

    - name: Extrair ISOs
      shell: cmd
      run: |
        mkdir work
        7z x w11\w11.iso -owork\w11 -y
        7z x w10_22h2\w10_22h2.iso -owork\w10_22 -y
        7z x w10_21h2\w10_21h2.iso -owork\w10_21 -y

    - name: Criar ESD unificado
      shell: cmd
      run: |
        dism /Export-Image /SourceImageFile:work\w11\sources\install.esd /SourceIndex:4 /DestinationImageFile:work\final.esd /Compress:recovery
        dism /Export-Image /SourceImageFile:work\w10_22\sources\install.esd /SourceIndex:4 /DestinationImageFile:work\final.esd /Compress:recovery
        dism /Export-Image /SourceImageFile:work\w10_21\sources\install.esd /SourceIndex:1 /DestinationImageFile:work\final.esd /Compress:recovery

    - name: Nomear edições
      shell: cmd
      run: |
        dism /Set-ImageName /ImageFile:work\final.esd /Index:1 /Name:"Windows 11 23H2 Pro"
        dism /Set-ImageName /ImageFile:work\final.esd /Index:2 /Name:"Windows 10 22H2 Pro"
        dism /Set-ImageName /ImageFile:work\final.esd /Index:3 /Name:"Windows 10 21H2 LTSC"

    - name: Criar ISO final
      shell: cmd
      run: |
        copy /y work\final.esd work\w11\sources\install.esd
        7z a pt-br_windows_11_10_pro_ltsc_aio_update_esd_w10ui.iso .\work\w11\*

    - name: Compactar final
      shell: cmd
      run: |
        7z a -t7z -mx=9 -v1900m WIMAIOPROLTSC1110ESDW10UI.7z pt-br_windows_11_10_pro_ltsc_aio_update_esd_w10ui.iso

    - name: Release final
      uses: ncipollo/release-action@v1
      with:
        tag: AIO-WINDOWS-${{ github.run_number }}
        name: AIO Windows 11 + 10 ISO
        artifacts: WIMAIOPROLTSC1110ESDW10UI.7z.*
        token: ${{ secrets.GITHUB_TOKEN }}

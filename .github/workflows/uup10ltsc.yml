name: Build Windows 10 LTSC ISO (W10UI)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Instalar 7zip e aria2
      shell: cmd
      run: |
        choco install 7zip -y
        choco install aria2 -y

    # 🔽 DOWNLOAD ISO BASE (ESTÁVEL)
    - name: Baixar ISO base
      shell: cmd
      run: |
        curl -L -o base.7z.001 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.001
        curl -L -o base.7z.002 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.002
        curl -L -o base.7z.003 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.003

    # 🔽 EXTRAIR ISO
    - name: Extrair ISO
      shell: cmd
      run: |
        mkdir ISO
        7z x base.7z.001 -oISO -y

    # 🔽 EXTRAIR UUP
    - name: Extrair UUP
      shell: cmd
      run: |
        mkdir uup
        7z x uup10ltsc.zip -ouup -y

        if not exist uup\uup_download_windows.cmd (
          echo ERRO: Script UUP nao encontrado
          exit /b 1
        )

    # 🔧 ARIA2 NO LOCAL CERTO
    - name: Preparar aria2
      shell: cmd
      run: |
        where aria2c
        copy /Y "%ProgramData%\chocolatey\bin\aria2c.exe" uup\aria2c.exe

    # 🔥 BAIXAR UPDATES (SCRIPT ORIGINAL)
    - name: Baixar updates
      shell: cmd
      working-directory: uup
      run: |
        echo ===== INICIO DOWNLOAD UUP =====
        call uup_download_windows.cmd
        if %errorlevel% neq 0 exit /b 1

    # 🔽 PREPARAR W10UI
    - name: Preparar W10UI
      shell: cmd
      run: |
        mkdir W10UI\DVD
        xcopy ISO\* W10UI\DVD\ /E /H /C /I /Y

        mkdir W10UI\Files\UUPs
        xcopy uup\* W10UI\Files\UUPs\ /E /H /C /I /Y

    # 🔥 EXECUTAR W10UI
    - name: Rodar W10UI
      shell: cmd
      working-directory: W10UI
      run: |
        echo ===== INICIANDO W10UI =====
        call W10UI.cmd
        if %errorlevel% neq 0 exit /b 1

    # 🔍 LOCALIZAR ISO FINAL
    - name: Localizar ISO
      shell: cmd
      run: |
        echo ===== PROCURANDO ISO =====
        for /r %%i in (*.iso) do set ISOFILE=%%i

        if not defined ISOFILE (
          echo ISO NAO ENCONTRADA
          dir /s
          exit /b 1
        )

        echo ISO ENCONTRADA: %ISOFILE%
        move /Y "%ISOFILE%" FINAL.iso

    # 📦 COMPACTAR
    - name: Compactar ISO
      shell: cmd
      run: |
        7z a -tzip -v1900m FINAL.zip FINAL.iso

    # 🚀 RELEASE
    - name: Criar Release
      uses: ncipollo/release-action@v1
      with:
        tag: ltsc-${{ github.run_number }}
        name: Windows 10 LTSC Atualizado
        artifacts: FINAL.zip.*
        token: ${{ secrets.GITHUB_TOKEN }}

name: Gerar ISO Windows 11 (UUP) v2

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_win11:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Instalar dependências
      shell: powershell
      run: |
        choco install aria2 -y
        choco install 7zip -y

    - name: Extrair UUP
      shell: powershell
      run: |
        New-Item -ItemType Directory -Path uup -Force
        Expand-Archive "uup11.zip" -DestinationPath "uup" -Force

        if (!(Test-Path "uup\uup_download_windows.cmd")) {
          Write-Error "Script UUP não encontrado!"
          exit 1
        }

    - name: Preparar aria2
      shell: powershell
      run: |
        $aria = (Get-Command aria2c).Source
        Copy-Item $aria "uup\aria2c.exe" -Force

    - name: Executar UUP completo
      shell: cmd
      working-directory: uup
      run: |
        echo ===== INICIO UUP WIN11 =====
        call uup_download_windows.cmd

        if exist convert-UUP.cmd (
            call convert-UUP.cmd
        )

        if %errorlevel% neq 0 exit /b 1

    - name: Localizar ISO final
      shell: powershell
      run: |
        $iso = Get-ChildItem "uup" -Recurse -Filter *.iso |
               Sort-Object LastWriteTime -Descending |
               Select-Object -First 1

        if (!$iso) {
          Write-Error "ISO Windows 11 não gerada"
          Get-ChildItem -Recurse uup
          exit 1
        }

        if ($iso.Name -notmatch "22000|22621|22631|Win11|Windows") {
          Write-Error "ISO não corresponde ao Windows 11"
          exit 1
        }

        if ($iso.Length -lt 3GB) {
          Write-Error "ISO inválida"
          exit 1
        }

        Move-Item $iso.FullName "$env:GITHUB_WORKSPACE\WIN11.iso" -Force

    - name: Compactar ISO
      shell: powershell
      run: |
        7z a -tzip -v1900m WIN11.zip WIN11.iso

    - name: Criar Release
      uses: ncipollo/release-action@v1
      with:
        tag: win11-${{ github.run_number }}
        name: Windows 11 ISO
        artifacts: WIN11.zip.*
        token: ${{ secrets.GITHUB_TOKEN }}

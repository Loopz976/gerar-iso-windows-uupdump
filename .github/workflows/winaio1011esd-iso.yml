name: AIO FINAL WINDOWS (DEFINITIVO)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - uses: actions/checkout@v4

    - name: Instalar ferramentas (FORÇADO COMPLETO)
      shell: powershell
      run: |
        choco install 7zip -y

        # Instalar ADK Deployment Tools corretamente
        Invoke-WebRequest -Uri https://go.microsoft.com/fwlink/?linkid=2196127 -OutFile adksetup.exe
        Start-Process .\adksetup.exe -ArgumentList "/quiet /norestart /features OptionId.DeploymentTools" -Wait

    - name: Criar pasta
      shell: cmd
      run: mkdir work

    # =========================
    # 🔵 W11
    # =========================
    - name: Processar W11
      shell: cmd
      run: |
        cd work

        curl -L -o w11.7z.001 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W11-23H2-6060-W10UI-3/W1123H26060ESDISOW10UI.7z.001
        curl -L -o w11.7z.002 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W11-23H2-6060-W10UI-3/W1123H26060ESDISOW10UI.7z.002
        curl -L -o w11.7z.003 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W11-23H2-6060-W10UI-3/W1123H26060ESDISOW10UI.7z.003
        curl -L -o w11.7z.004 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W11-23H2-6060-W10UI-3/W1123H26060ESDISOW10UI.7z.004

        7z x w11.7z.001 -ow11 -y
        for %%i in (w11\*.iso) do 7z x "%%i" -ow11_ex -y

        dism /Export-Image /SourceImageFile:w11_ex\sources\install.esd /SourceIndex:4 /DestinationImageFile:final.esd /Compress:recovery

        rd /s /q w11 w11_ex
        del w11.7z.*

    # =========================
    # 🟢 W10 22H2
    # =========================
    - name: Processar W10 22H2
      shell: cmd
      run: |
        cd work

        curl -L -o w10_22.7z.001 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W10-22H2-6456-W10UI-3/W1022H26456ESDISOW10UI.7z.001
        curl -L -o w10_22.7z.002 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W10-22H2-6456-W10UI-3/W1022H26456ESDISOW10UI.7z.002
        curl -L -o w10_22.7z.003 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W10-22H2-6456-W10UI-3/W1022H26456ESDISOW10UI.7z.003

        7z x w10_22.7z.001 -ow10_22 -y
        for %%i in (w10_22\*.iso) do 7z x "%%i" -ow10_22_ex -y

        dism /Export-Image /SourceImageFile:w10_22_ex\sources\install.esd /SourceIndex:4 /DestinationImageFile:final.esd /Compress:recovery

        rd /s /q w10_22 w10_22_ex
        del w10_22.7z.*

    # =========================
    # 🟡 LTSC
    # =========================
    - name: Processar LTSC
      shell: cmd
      run: |
        cd work

        curl -L -o w10_21.7z.001 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W10-21H2-1288-W10UI-4/W1021H21288ESDISOW10UI.7z.001
        curl -L -o w10_21.7z.002 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W10-21H2-1288-W10UI-4/W1021H21288ESDISOW10UI.7z.002
        curl -L -o w10_21.7z.003 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W10-21H2-1288-W10UI-4/W1021H21288ESDISOW10UI.7z.003

        7z x w10_21.7z.001 -ow10_21 -y
        for %%i in (w10_21\*.iso) do 7z x "%%i" -ow10_21_ex -y

        dism /Export-Image /SourceImageFile:w10_21_ex\sources\install.esd /SourceIndex:1 /DestinationImageFile:final.esd /Compress:recovery

        rd /s /q w10_21 w10_21_ex
        del w10_21.7z.*

    # =========================
    # 💿 ISO FINAL
    # =========================
    - name: Criar ISO final
      shell: powershell
      run: |
        mkdir ISO

        curl -L -o base.7z.001 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W11-23H2-6060-W10UI-3/W1123H26060ESDISOW10UI.7z.001
        curl -L -o base.7z.002 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W11-23H2-6060-W10UI-3/W1123H26060ESDISOW10UI.7z.002
        curl -L -o base.7z.003 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W11-23H2-6060-W10UI-3/W1123H26060ESDISOW10UI.7z.003
        curl -L -o base.7z.004 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W11-23H2-6060-W10UI-3/W1123H26060ESDISOW10UI.7z.004

        7z x base.7z.001 -y -oISO
        Get-ChildItem ISO -Filter *.iso | ForEach-Object { 7z x $_.FullName -oISO -y }

        Copy-Item work\final.esd ISO\sources\install.esd -Force

        # Encontrar oscdimg correto
        $osc = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10" -Recurse -Filter oscdimg.exe |
               Where-Object { $_.FullName -like "*Deployment Tools*amd64*" } |
               Select-Object -First 1

        if (-not $osc) {
          Write-Host "ERRO: oscdimg nao encontrado"
          exit 1
        }

        Write-Host "Usando: $($osc.FullName)"

        $bios = Get-ChildItem ISO -Recurse -Filter etfsboot.com | Select-Object -First 1
        $efi  = Get-ChildItem ISO -Recurse -Filter efisys.bin | Select-Object -First 1

        & $osc.FullName -m -o -u2 -udfver102 `
        "-bootdata:2#p0,e,b$($bios.FullName)#pEF,e,b$($efi.FullName)" `
        ISO pt-br_windows_11_10_pro_ltsc_aio_update_esd_w10ui.iso

    # =========================
    # 📦 7Z
    # =========================
    - name: Compactar
      shell: cmd
      run: |
        7z a -t7z -mx=9 -v1900m WIMAIOPROLTSC1110ESDW10UI.7z pt-br_windows_11_10_pro_ltsc_aio_update_esd_w10ui.iso

    # =========================
    # 🚀 RELEASE
    # =========================
    - name: Release
      uses: ncipollo/release-action@v1
      with:
        tag: AIO-${{ github.run_number }}
        name: AIO Windows Final
        artifacts: WIMAIOPROLTSC1110ESDW10UI.7z.*
        token: ${{ secrets.GITHUB_TOKEN }}

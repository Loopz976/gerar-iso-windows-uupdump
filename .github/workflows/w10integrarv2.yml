name: W10 IOT LTSC PTBR DISM FINAL FIXED v2

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - uses: actions/checkout@v4

    - name: LIMPAR
      shell: cmd
      run: |
        rmdir /s /q D:\ISO 2>nul
        rmdir /s /q D:\MOUNT 2>nul
        rmdir /s /q D:\LANG 2>nul
        rmdir /s /q D:\BOOTLANG 2>nul
        del /f /q *.iso 2>nul

    - name: Instalar ferramentas
      shell: cmd
      run: |
        choco install 7zip -y
        choco install aria2 -y

    - name: Criar pastas
      shell: cmd
      run: |
        mkdir D:\ISO
        mkdir D:\MOUNT
        mkdir D:\LANG
        mkdir D:\BOOTLANG

    - name: Baixar ISO
      shell: cmd
      run: |
        aria2c -x16 -s16 -o iso.7z.001 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W10-IOT-LTSC-PTBR-5/W10-IOT-LTSC-PTBR.7z.001
        aria2c -x16 -s16 -o iso.7z.002 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W10-IOT-LTSC-PTBR-5/W10-IOT-LTSC-PTBR.7z.002
        aria2c -x16 -s16 -o iso.7z.003 https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/W10-IOT-LTSC-PTBR-5/W10-IOT-LTSC-PTBR.7z.003

    - name: Extrair ISO
      shell: cmd
      run: |
        7z x iso.7z.001 -y
        for %%i in (*.iso) do 7z x "%%i" -oD:\ISO -y

    - name: Converter ESD para WIM
      shell: cmd
      run: |
        dism /Export-Image /SourceImageFile:D:\ISO\sources\install.esd /SourceIndex:1 /DestinationImageFile:D:\ISO\sources\install.wim /Compress:max
        dism /Export-Image /SourceImageFile:D:\ISO\sources\install.esd /SourceIndex:2 /DestinationImageFile:D:\ISO\sources\install.wim /Compress:max
        del D:\ISO\sources\install.esd

    - name: Baixar idioma
      shell: cmd
      run: |
        aria2c -x16 -s16 -o lang.zip https://github.com/Loopz976/gerar-iso-windows-uupdump/releases/download/w10-iotltsc-1288-ptbr-pack/pt-br-pack.zip

    - name: Extrair idioma
      shell: cmd
      run: |
        7z x lang.zip -oD:\LANG -y

    - name: Separar WinPE
      shell: cmd
      run: |
        move D:\LANG\*WinPE*.cab D:\BOOTLANG

    - name: INSTALL index 1
      shell: cmd
      run: |
        dism /Mount-Wim /WimFile:D:\ISO\sources\install.wim /index:1 /MountDir:D:\MOUNT
        dism /Image:D:\MOUNT /Add-Package /PackagePath:D:\LANG\lp.cab
        for %%i in (D:\LANG\Microsoft-Windows-LanguageFeatures-*.cab) do dism /Image:D:\MOUNT /Add-Package /PackagePath:"%%i"
        dism /Image:D:\MOUNT /Set-AllIntl:pt-BR
        dism /Image:D:\MOUNT /Set-InputLocale:0416:00010416
        dism /Unmount-Wim /MountDir:D:\MOUNT /Commit

    - name: INSTALL index 2
      shell: cmd
      run: |
        dism /Mount-Wim /WimFile:D:\ISO\sources\install.wim /index:2 /MountDir:D:\MOUNT
        dism /Image:D:\MOUNT /Add-Package /PackagePath:D:\LANG\lp.cab
        for %%i in (D:\LANG\Microsoft-Windows-LanguageFeatures-*.cab) do dism /Image:D:\MOUNT /Add-Package /PackagePath:"%%i"
        dism /Image:D:\MOUNT /Set-AllIntl:pt-BR
        dism /Image:D:\MOUNT /Set-InputLocale:0416:00010416
        dism /Unmount-Wim /MountDir:D:\MOUNT /Commit

    - name: BOOT index 1
      shell: cmd
      run: |
        dism /Mount-Wim /WimFile:D:\ISO\sources\boot.wim /index:1 /MountDir:D:\MOUNT
        for %%i in (D:\BOOTLANG\*.cab) do dism /Image:D:\MOUNT /Add-Package /PackagePath:"%%i"
        dism /Image:D:\MOUNT /Set-AllIntl:pt-BR
        dism /Unmount-Wim /MountDir:D:\MOUNT /Commit

    - name: BOOT index 2 (SETUP)
      shell: cmd
      run: |
        dism /Mount-Wim /WimFile:D:\ISO\sources\boot.wim /index:2 /MountDir:D:\MOUNT
        for %%i in (D:\BOOTLANG\*.cab) do dism /Image:D:\MOUNT /Add-Package /PackagePath:"%%i"
        dism /Image:D:\MOUNT /Set-AllIntl:pt-BR
        dism /Unmount-Wim /MountDir:D:\MOUNT /Commit

    - name: Converter WIM para ESD
      shell: cmd
      run: |
        dism /Export-Image /SourceImageFile:D:\ISO\sources\install.wim /SourceIndex:1 /DestinationImageFile:D:\ISO\sources\install.esd /Compress:recovery
        dism /Export-Image /SourceImageFile:D:\ISO\sources\install.wim /SourceIndex:2 /DestinationImageFile:D:\ISO\sources\install.esd /Compress:recovery
        del D:\ISO\sources\install.wim

    - name: Criar ISO
      shell: cmd
      run: |
        7z a -tiso FINAL.iso D:\ISO\*

    - name: Compactar
      shell: cmd
      run: |
        7z a -t7z -v1900m FINAL.7z FINAL.iso

    - name: Release
      uses: ncipollo/release-action@v1
      with:
        tag: FINAL-PTBR-FIXED-${{ github.run_number }}
        name: Windows 10 IOT LTSC PTBR FINAL FIXED
        artifacts: FINAL.7z.*
        token: ${{ secrets.GITHUB_TOKEN }}

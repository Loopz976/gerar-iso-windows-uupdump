name: VALIDADO - Gerar ISO Windows 11

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_win11:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Instalar dependências
      run: choco install aria2 7zip -y

    # EXTRAIR
    - name: Extrair UUP
      shell: powershell
      run: |
        mkdir uup
        Expand-Archive uup11.zip uup -Force

        if (!(Test-Path "uup\uup_download_windows.cmd")) {
          Write-Error "Script não encontrado"
          exit 1
        }

    # DEBUG UUP
    - name: Ver estrutura UUP
      run: dir uup

    # ARIA2
    - name: Preparar aria2
      shell: powershell
      run: |
        $aria = (Get-Command aria2c).Source
        mkdir uup\files
        Copy-Item $aria uup\files\aria2c.exe

    # EXECUTAR
    - name: Executar UUP
      shell: cmd
      working-directory: uup
      run: uup_download_windows.cmd

    # VALIDAR DOWNLOADS
    - name: Validar arquivos baixados
      shell: powershell
      run: |
        $files = Get-ChildItem -Recurse uup
        if ($files.Count -lt 5) {
          Write-Error "Poucos arquivos baixados - erro UUP"
          exit 1
        }

    # LOCALIZAR ISO
    - name: Localizar ISO
      shell: powershell
      run: |
        $iso = Get-ChildItem -Recurse -Filter *.iso | Select-Object -First 1
        if (!$iso) {
          Write-Error "ISO não encontrada"
          exit 1
        }

        Move-Item $iso.FullName WIN11.iso

    # VALIDAR ISO
    - name: Validar ISO
      shell: powershell
      run: |
        if (!(Test-Path "WIN11.iso")) {
          Write-Error "ISO não existe"
          exit 1
        }

        Write-Host "ISO encontrada:"
        Get-Item WIN11.iso

    # COMPACTAR
    - name: Compactar ISO
      run: |
        7z a -tzip WIN11.zip WIN11.iso -mx=9 -v1900m

    # VALIDAR PARTES
    - name: Ver arquivos compactados
      run: |
        dir WIN11.zip.*

    # RELEASE
    - name: Criar Release
      uses: ncipollo/release-action@v1
      with:
        tag: win11-${{ github.run_number }}
        name: Windows 11 ISO
        artifacts: WIN11.zip.*
        token: ${{ secrets.GITHUB_TOKEN }}
